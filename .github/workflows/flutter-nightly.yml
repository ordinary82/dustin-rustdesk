name: Flutter Nightly Build

# Disabled — using rdgen (https://rdgen.crayoneater.org/) for custom client builds instead.
# To re-enable, uncomment the triggers below.
on:
  # schedule:
  #   - cron: "0 0 * * *"
  # workflow_dispatch:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Nightly is disabled — use rdgen instead. Type YES to force a build anyway."
        required: true

permissions:
  contents: write

jobs:
  run-flutter-nightly-build:
    if: github.event.inputs.confirm == 'YES'
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
